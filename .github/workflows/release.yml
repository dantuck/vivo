name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and attach assets to (e.g. v0.3.1)"
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          # - target: aarch64-apple-darwin
          #   os: macos-15
          #   use_cross: false

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (x86_64 Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64 Linux)
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cross
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          ASSET="vivo-${VERSION}-${{ matrix.target }}.tar.gz"
          cp "target/${{ matrix.target }}/release/vivo" vivo
          tar czf "$ASSET" vivo
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          find artifacts -name '*.tar.gz' -exec sha256sum {} \; | sed 's|artifacts/[^/]*/||' > checksums.sha256
          cat checksums.sha256

      - name: Collect assets
        run: |
          mkdir release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;
          cp checksums.sha256 release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Trigger marketing site rebuild
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/dantuck/vivo-marketing.git
          cd vivo-marketing
          echo "${VERSION}" > src/_version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/_version
          git commit -m "chore: release ${VERSION}"
          git push
        env:
          GH_TOKEN: ${{ secrets.MARKETING_DEPLOY_TOKEN }}
          VERSION: ${{ github.event.inputs.tag || github.event.release.tag_name }}
